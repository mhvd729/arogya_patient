*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{display:flex;justify-content:center;min-height:100vh;transition:background .3s;font-family:'DM Sans','Segoe UI',sans-serif}
body.dark{background:#060d0a}
body.light{background:#e8f5ee}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{border-radius:10px}
body.dark ::-webkit-scrollbar-thumb{background:#1e3228}
body.light ::-webkit-scrollbar-thumb{background:#a0c8b0}
input[type="text"],input[type="email"],input[type="tel"],input[type="password"],textarea{font-family:'DM Sans','Segoe UI',sans-serif;-webkit-appearance:none;}
input::placeholder,textarea::placeholder{color:#3a5a4a}
textarea{resize:none}
.pin-box{width:58px;height:68px;border-radius:16px;background:transparent;border:2px solid #1e3228;text-align:center;font-size:28px;font-weight:900;outline:none;font-family:'Syne',sans-serif;color:#00c87a !important;caret-color:#00c87a;-webkit-text-fill-color:#00c87a;transition:border-color .2s;}
.pin-box:focus{border-color:#a78bfa;box-shadow:0 0 0 3px #a78bfa22}
.pin-box.filled{border-color:#a78bfa}
.pin-box.err{border-color:#e05c5c !important;-webkit-text-fill-color:#e05c5c;color:#e05c5c !important}
.otp-box{width:48px;height:56px;border-radius:14px;background:#162920;border:2px solid #1e3228;text-align:center;font-size:22px;font-weight:900;outline:none;font-family:'Syne',sans-serif;color:#00c87a !important;-webkit-text-fill-color:#00c87a;caret-color:#00c87a;transition:border .2s;}
.otp-box:focus{border-color:#00c87a;box-shadow:0 0 0 3px #00c87a22}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes emergPulse{0%,100%{box-shadow:0 0 0 0 #e05c5c55}50%{box-shadow:0 0 0 14px #e05c5c00}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.1)}80%{transform:scale(0.95)}100%{transform:scale(1);opacity:1}}
@keyframes rippleMap{0%{r:8;opacity:0.8}100%{r:22;opacity:0}}
.ai{animation:fadeUp .38s cubic-bezier(.16,1,.3,1) both}
.spin{animation:spin 1s linear infinite}
.live{animation:pulse 1.6s infinite}
.epulse{animation:emergPulse 1s infinite}
.bounce{animation:bounceIn .5s cubic-bezier(.16,1,.3,1) both}
/* Sidebar overlay */
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#00000066;z-index:200;opacity:0;animation:fadeUp .2s forwards}
.sidebar-panel{position:fixed;top:0;right:0;bottom:0;width:280px;z-index:201;animation:slideRight .28s cubic-bezier(.16,1,.3,1) forwards}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>

function getDist(d){const R=6371,dLat=(d.lat-LT.userLat)*Math.PI/180,dLng=(d.lng-LT.userLng)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(LT.userLat*Math.PI/180)*Math.cos(d.lat*Math.PI/180)*Math.sin(dLng/2)**2;return(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);}
function getETA(dist){return Math.max(1,Math.ceil(parseFloat(dist)*3.8));}
function sortByDist(arr){return[...arr].sort((a,b)=>parseFloat(getDist(a))-parseFloat(getDist(b)));}
function sortByRating(arr){return[...arr].sort((a,b)=>b.rating-a.rating);}
function sortByFee(arr){return[...arr].sort((a,b)=>a.fee-b.fee);}
function sortDoctors(arr,mode){if(mode==='rating')return sortByRating(arr);if(mode==='fee')return sortByFee(arr);return sortByDist(arr);}

  const mid={x:(user.x+tPos.x)/2,y:(user.y+tPos.y)/2-25};

          <circle cx="${hp.x}" cy="${hp.y}" r="16" fill="#e05c5c14"><animate attributeName="r" from="10" to="20" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite"/></circle>

        ${mode==='pharmacy'?[[28.6380,77.2100,"Apollo"],[28.6200,77.2000,"MedPlus"],[28.5900,77.2300,"1mg"],[28.6600,77.1800,"Jan Aushadhi"],[28.5700,77.1600,"NetMeds"]].map(([lat,lng,name])=>{const pp=toXY(lat,lng);return`<circle cx="${pp.x}" cy="${pp.y}" r="11" fill="${isDark()?'#2a1a00':'#fff3d0'}" stroke="${C().gold}" stroke-width="1.5"/><text x="${pp.x}" y="${pp.y+4}" text-anchor="middle" font-size="9" fill="${C().gold}">💊</text><text x="${pp.x}" y="${pp.y+20}" text-anchor="middle" font-size="7" fill="${C().gold}" font-family="DM Sans,sans-serif">${name}</text>`;}).join(''):''}

        ${LT.active?`<circle r="5" fill="${C().primary}"><animateMotion dur="3s" repeatCount="indefinite" path="M${user.x},${user.y} Q${mid.x},${mid.y} ${tPos.x},${tPos.y}"/></circle>`:''}

        <text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-size="${isT?8:6}" fill="${d.ac}" font-family="DM Sans,sans-serif" font-weight="800">${d.av}</text>

        <text x="${p.x}" y="${p.y+38}" text-anchor="middle" font-size="7" fill="${C().dim}" font-family="DM Sans,sans-serif">${getDist(d)}km·${getETA(getDist(d))}min</text>`:''}
        ${isN&&!isT?`<rect x="${p.x-18}" y="${p.y-22}" width="36" height="13" rx="4" fill="${C().primary}"/><text x="${p.x}" y="${p.y-13}" text-anchor="middle" font-size="7" fill="#000" font-family="DM Sans,sans-serif" font-weight="900">NEAREST</text>`:''}`}).join('')}`:''}
        <circle cx="${user.x}" cy="${user.y}" r="14" fill="${C().primary}14" stroke="${C().primary}44" stroke-width="0.5"><animate attributeName="r" from="8" to="18" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="${user.x}" cy="${user.y}" r="7" fill="${C().primary}44" stroke="${C().primary}" stroke-width="2.5"/>
        <circle cx="${user.x}" cy="${user.y}" r="3" fill="${C().primary}"/>
        <text x="${user.x+10}" y="${user.y+4}" font-size="8" fill="${C().primary}" font-family="DM Sans,sans-serif" font-weight="700">You</text>
      </svg>
    </div>
    <div style="padding:10px 14px 90px;overflow-y:auto;max-height:200px">

    </div>

window.setTab=t=>{APP.tab=t;APP.screen=null;APP.search="";APP.showSortSidebar=false;window.scrollTo(0,0);render();}
window.setScreen=s=>{APP.screen=s;APP.showSortSidebar=false;window.scrollTo(0,0);render();}
window.goDoc=id=>{const d=DOCTORS.find(x=>x.id===id);if(d){APP.selDoc=d;APP.selSlot=null;APP.booked=false;APP.screen="booking";render();}}
window.openMap=id=>{APP.mapDoc=id?DOCTORS.find(x=>x.id===id)||null:null;APP.screen="map";APP.mapMode='clinics';render();}
window.setFamIdx=i=>{APP.famIdx=i;render();}
window.gotoSpecialty=sp=>{APP.specFilter=sp;APP.tab="doctors";APP.screen=null;APP.showSortSidebar=false;render();}
window.setSymInput=v=>{APP.symInput=v;APP.symRes=null;render();}
window.setMedInput=v=>{APP.medInput=v;APP.medRes=null;APP.medTab='branded';checkMed();}
window.openMedOrder=key=>{
  const data=MEDICINES_DB[key];
  if(!data){showToast('Searching prices for '+key+'...');setScreen('ai-medicine');APP.medInput=key;checkMed();return;}
  APP.medInput=key;APP.medRes=data;APP.medTab='branded';setScreen('ai-medicine');
};
window.confirmBooking=()=>{
  if(!APP.selSlot)return;
  APP.booked=true;APP.qTimer=APP.selDoc.queue*8;render();
  if(APP.qInterval)clearInterval(APP.qInterval);
  APP.qInterval=setInterval(()=>{if(APP.qTimer>0){APP.qTimer--;const el=document.getElementById('qTimerDisp');if(el)el.innerHTML=APP.qTimer+' <span style="font-size:14px;color:'+C().muted+'">mins</span>';}else clearInterval(APP.qInterval);},4000);
};
window.pinDigit=(i,val)=>{
  APP.vaultPinVal[i]=val;APP.vaultPin=APP.vaultPinVal.join('');APP.pinErr=false;
  const el=document.getElementById('pin'+i);if(el){el.classList.toggle('filled',!!val);el.classList.remove('err');}
  if(val&&i<3){const n=document.getElementById('pin'+(i+1));if(n)n.focus();}
  if(APP.vaultPin.length===4)setTimeout(()=>unlockVault(),120);
};
window.pinKeydown=(e,i)=>{
  if(e.key==="Backspace"){APP.vaultPinVal[i]="";APP.vaultPin=APP.vaultPinVal.join('');const el=document.getElementById('pin'+i);if(el){el.value="";el.classList.remove('filled');}if(i>0){const p=document.getElementById('pin'+(i-1));if(p)p.focus();}render();}
};
window.unlockVault=()=>{if(APP.vaultPin==="1234"){APP.vaultOpen=true;APP.pinErr=false;APP.vaultPinVal=["","","",""];}else{APP.pinErr=true;APP.vaultPinVal=["","","",""];APP.vaultPin="";}render();}
window.lockVault=()=>{APP.vaultOpen=false;APP.vaultPin="";APP.vaultPinVal=["","","",""];APP.pinErr=false;render();}
window.toggleShare=(id,hrs)=>{APP.records=APP.records.map(r=>r.id===id?{...r,shared:!r.shared,sharedUntil:!r.shared?hrs+'h':null}:r);render();}
window.checkSym=()=>{const inp=document.getElementById('symInput');if(inp)APP.symInput=inp.value;const k=Object.keys(SYMPTOMS).find(k=>APP.symInput.toLowerCase().includes(k));APP.symRes=k?SYMPTOMS[k]:{specialist:"General Physician",urgency:"low",advice:"Symptoms unclear. Consult a General Physician."};render();}
window.checkMed=()=>{
  const inp=document.getElementById('medInput');if(inp)APP.medInput=inp.value;
  const key=APP.medInput.toLowerCase().trim();
  const k=Object.keys(MEDICINES_DB).find(k=>key.includes(k)||k.includes(key));
  APP.medRes=k?MEDICINES_DB[k]:{branded:[{ph:"Apollo Pharmacy",brand:APP.medInput,pack:"Ask pharmacist",generic:"Consult pharmacist",price:45,dist:"0.4 km",inStock:true,delivery:false},{ph:"MedPlus",brand:APP.medInput,pack:"Ask pharmacist",generic:"Consult pharmacist",price:38,dist:"1.2 km",inStock:false,delivery:false}]};
  APP.medTab='branded';render();
};
window.toggleLiveTracking=()=>{
  if(LT.active){clearInterval(LT.interval);LT.active=false;LT.step=0;LT.userLat=28.6139;LT.userLng=77.2090;showToast('Live tracking stopped');}
  else{LT.active=true;LT.targetDoc=APP.mapDoc||sortByDist(DOCTORS)[0];showToast('📡 Live tracking started');
    LT.interval=setInterval(()=>{const td=LT.targetDoc;LT.userLat+=(td.lat-LT.userLat)*0.09;LT.userLng+=(td.lng-LT.userLng)*0.09;LT.step++;
      const newDist=getDist(td);const etaEl=document.getElementById('liveETA');const distEl=document.getElementById('liveDist');
      if(etaEl)etaEl.textContent=getETA(newDist)+' min';if(distEl)distEl.textContent=newDist+' km';
      if(LT.step>=12||parseFloat(newDist)<0.25){clearInterval(LT.interval);LT.active=false;LT.step=0;showToast('🏥 Arrived at '+td.clinic+'!');render();}
    },1800);}
  render();
};

window.copyAISummary=()=>{if(!APP.aiSummary)return;if(navigator.clipboard)navigator.clipboard.writeText(APP.aiSummary).then(()=>showToast('Summary copied ✓')).catch(()=>{});else showToast('Select and copy the text manually');}
window.sendOTP=()=>{if(APP.loginPhone.length!==10){showToast('Enter valid 10-digit number');return;}APP.loginOtpSent=true;APP.loginStep=3;APP.loginOtp="";render();setTimeout(()=>document.getElementById('otp0')?.focus(),200);}
window.otpDigit=(i,val)=>{const arr=(APP.loginOtp||'').split('');arr[i]=val;APP.loginOtp=arr.join('').slice(0,6);if(val&&i<5){const n=document.getElementById('otp'+(i+1));if(n)n.focus();}};
window.otpKey=(e,i)=>{if(e.key==="Backspace"){const arr=(APP.loginOtp||'').split('');arr[i]='';APP.loginOtp=arr.join('');const el=document.getElementById('otp'+i);if(el)el.value='';if(i>0){const p=document.getElementById('otp'+(i-1));if(p)p.focus();}}};
window.verifyOTP=()=>{const entered=(APP.loginOtp||'').replace(/\s/g,'');if(entered==='123456'){if(APP.isNewUser){APP.loginStep=4;render();setTimeout(()=>document.getElementById('nameInput')?.focus(),200);}else{APP.loginName=APP.loginName||'Avneesh Pathak';APP.loginAge=APP.loginAge||'19';APP.loginBlood=APP.loginBlood||'B+';APP.loggedIn=true;render();}}else{showToast('❌ Wrong OTP. Hint: 123456');}};
window.completeProfile=()=>{if(!APP.loginName||!APP.loginAge){showToast('Please fill all fields');return;}FAMILY[0].name=APP.loginName;FAMILY[0].age=parseInt(APP.loginAge)||19;APP.loggedIn=true;render();setTimeout(()=>showToast('Welcome to Arogya, '+APP.loginName+'! 🎉'),400);}
window.doLogout=()=>{APP.loggedIn=false;APP.loginStep=1;APP.loginPhone="";APP.loginOtp="";APP.vaultOpen=false;APP.vaultPin="";APP.vaultPinVal=["","","",""];APP.aiSummary=null;APP.aiError=null;APP.tab="home";APP.screen=null;render();}
window.showToast=msg=>{let t=document.getElementById('_toast');if(!t){t=document.createElement('div');t.id='_toast';document.body.appendChild(t);}t.style.cssText=`position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:${isDark()?'#0d3326':'#d0f0e0'};color:${C().primary};padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;border:1px solid ${C().primary}44;max-width:340px;text-align:center;opacity:1;transition:opacity .3s;pointer-events:none`;t.textContent=msg;clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},3500);}
render();
